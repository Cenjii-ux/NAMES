</head>
<body>

<div class="crate" onclick="openCrate()"></div>

<div class="spinner-container" id="container">
    <div class="marker"></div>
    <div class="spinner" id="spinner"></div>
</div>

<div class="winner" id="winnerText"></div>

<script>

// NAMES LIST
const names = [
"ALEGRE",  
"ANDO", 
"ANIA", 
"AQUINO",
"ARMERO", 
"BACIA", 
"BERTO",
"CALAMPIANO", 
"CIVICO",
"CUIZON", 
"CUADERO", 
"DAGAMI", 
"DE GUZMAN",
"DE BLAS", 
"DUMANDAN", 
"GALLEGO", 
"GITALLA", 
"GUERINA", 
"HILARIO", 
"JUMAWID", 
"LASTICA",  
"LABAJO", 
"LETRIRO", 
"MAKINANO", 
"MALUNES", 
"MANZANO", 
"MASINDA",
"PEROLINO", 
"QUIETA",  
"RADA", 
"SABAYTON", 
"SANTIAGO",  
"SEPULVIDA", 
"SIBONGGA",  
"TOLLEDO",

];

const spinner = document.getElementById("spinner");



for(let i=0;i<50;i++){

    names.forEach(name=>{
        const div = document.createElement("div");
        div.className="name";
        div.innerText=name;
        spinner.appendChild(div);
    });

}


function openCrate(){

document.getElementById("spinSound").play();

document.querySelector(".crate").style.display="none";
document.getElementById("container").style.display="block";

spin();

}

function fireConfetti() {

    const duration = 3000;
    const end = Date.now() + duration;

    (function frame() {

        confetti({
            particleCount: 5,
            angle: 60,
            spread: 55,
            origin: { x: 0 }
        });

        confetti({
            particleCount: 5,
            angle: 120,
            spread: 55,
            origin: { x: 1 }
        });

        if (Date.now() < end) {
            requestAnimationFrame(frame);
        }

    }());
}


function spin(){

    spinSound.pause();
    spinSound.currentTime = 0;
    spinSound.play();

    let duration = spinSound.duration;
    if (!duration || isNaN(duration)) duration = 6;
    duration *= 1000;

    const items = document.querySelectorAll(".name");
    const container = document.getElementById("container");

    const itemWidth = items[0].offsetWidth;
    const containerWidth = container.offsetWidth;

    // choose a winner from the FULL visual list
    const buffer = 20; // avoid stopping too early or too late
    const randomVisualIndex =
        Math.floor(Math.random() * (items.length - buffer*2)) + buffer;

    const winnerElement = items[randomVisualIndex];
    const winnerName = winnerElement.innerText;

    // calculate exact center position
    const itemCenter = winnerElement.offsetLeft + (itemWidth / 2);
    const containerCenter = containerWidth / 2;

    const distance = itemCenter - containerCenter;

    spinner.style.transition =
        duration + "ms cubic-bezier(.08,.6,.15,1)";

    spinner.style.transform =
        `translateX(-${distance}px)`;

    setTimeout(()=>{

        document.getElementById("winnerText").innerText =
        "🎉 Winner: " + winnerName + " 🎉";

        fireConfetti();
        document.getElementById("winSound").play();

    }, duration);
}

</script>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</body>

<audio id="spinSound" src="among-us-role-reveal-sound.mp3"></audio>
<audio id="winSound" src="winners_W9Cpenj.mp3"></audio>
</html>
